<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Astro Sanjog | ज्योतिषाचार्य प. संजय जी</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #02050a; color: #fff; font-family: 'Poppins', sans-serif; }
        
        /* 3D Background */
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        
        /* Content Wrapper: सुनिश्चित करता है कि कंटेंट हमेशा 3D बैकग्राउंड के ऊपर दिखे */
        #main-content { position: relative; z-index: 1; width: 100%; }

        /* बेसिक स्टाइलिंग ताकि टेक्स्ट दिखे */
        .hero { padding: 50px; text-align: center; }
        h1 { color: #ffdf8c; }
    </style>
</head>
<body>

    <!-- 3D Background -->
    <div id="canvas-container"></div>

    <!-- Website Content -->
    <div id="main-content">
        <div class="hero">
            <h1>ज्योतिषाचार्य प. संजय जी</h1>
            <p>प्राचीन तांत्रिक विद्या एवं वैदिक विश्लेषण</p>
        </div>
        <!-- बाकी का आपका कंटेंट यहाँ आएगा -->
    </div>

    <!-- Three.js Script -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 3D Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Simple Ambient Light
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // Resize Fix
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
